<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080808"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>

    <!-- very subtle gray vignette blobs, monochrome only -->
    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c1c1c" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#161616" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="260" fill="url(#bg)" rx="6"/>

  <!-- subtle monochrome depth blobs -->
  <ellipse cx="80" cy="80" rx="300" ry="200" fill="url(#g1)" opacity="0.6"/>
  <ellipse cx="820" cy="200" rx="260" ry="180" fill="url(#g2)" opacity="0.5"/>

  <!-- top-left corner mark -->
  <line x1="48" y1="48" x2="80" y2="48" stroke="#ffffff" stroke-opacity="0.15" stroke-width="0.75"/>
  <line x1="48" y1="48" x2="48" y2="80" stroke="#ffffff" stroke-opacity="0.15" stroke-width="0.75"/>

  <!-- bottom-right corner mark -->
  <line x1="852" y1="212" x2="820" y2="212" stroke="#ffffff" stroke-opacity="0.08" stroke-width="0.75"/>
  <line x1="852" y1="212" x2="852" y2="180" stroke="#ffffff" stroke-opacity="0.08" stroke-width="0.75"/>

  <!-- small index label -->
  <text x="48" y="44" font-family="'Courier New', monospace" font-size="8" fill="#ffffff" fill-opacity="0.18" letter-spacing="3.5">01 / PROFILE</text>

  <!-- NAME — clean, sharp, no-serif system feel via letter-spacing -->
  <text
    x="48"
    y="148"
    font-family="'Trebuchet MS', 'Gill Sans', 'Lucida Grande', sans-serif"
    font-size="58"
    font-weight="200"
    fill="#ffffff"
    fill-opacity="0.95"
    letter-spacing="2"
  >Mohith Nakka</text>

  <!-- thin rule under name -->
  <line x1="48" y1="164" x2="860" y2="164" stroke="#ffffff" stroke-opacity="0.06" stroke-width="0.5"/>

  <!-- tagline — spaced monospace, low opacity -->
  <text
    x="50"
    y="196"
    font-family="'Courier New', monospace"
    font-size="11"
    font-weight="400"
    fill="#ffffff"
    fill-opacity="0.3"
    letter-spacing="5"
  >BUILD  BREAK  DEBUG</text>
</svg>
